name: You Snoze You Loze
author: Sushikii
category: OSINT
description: |
    D'oh, I overslept and missed most of the race! But wait,
    my friend took a picture while I was out, but I can't tell
    whose in the lead. Can you help me figure out the two cars
    that are in the lead? Usually they like to twin around this
    time of night... 

