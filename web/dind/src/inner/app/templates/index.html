<!DOCTYPE html>
<html>
<head>
    <title>Ping Tool</title>
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <h1>Network Ping Tool</h1>
    <form id="pingForm">
        <input type="text" name="host" id="host" placeholder="Enter IP or hostname">
        <button type="submit">Ping</button>
    </form>
    <div id="results"></div>

    <script>
        document.getElementById('pingForm').onsubmit = async (e) => {
            e.preventDefault();
            const host = document.getElementById('host').value;
            const results = document.getElementById('results');
            results.innerHTML = '<p>Running...</p>';
            
            const response = await fetch('/ping', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'host=' + encodeURIComponent(host)
            });
            
            const text = await response.text();
            results.innerHTML = text;
        };
    </script>
</body>
</html>
