services:
  # This is your "outer" container that runs Docker inside it
  outer:
    image: docker:dind
    privileged: true
    ports:
      - "8021:8021"
    volumes:
      # Mount your entire project directory into the outer container
      - ./src/inner:/workspace:ro
      - ./src/flag.txt:/flag/flag.txt:ro
      - ./src/startup.sh:/startup.sh:ro
    working_dir: /workspace
    command: /startup.sh

    
